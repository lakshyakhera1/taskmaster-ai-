<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #fff; }
        .header { background: linear-gradient(135deg, #667eea, #764ba2); padding: 20px; text-align: center; }
        .header h1 { font-size: 2em; }
        .header p { opacity: 0.8; margin-top: 5px; }
        .container { max-width: 800px; margin: 30px auto; padding: 20px; }
        .input-section { background: #1a1a2e; border-radius: 15px; padding: 25px; margin-bottom: 20px; }
        .input-section h2 { margin-bottom: 15px; color: #667eea; }
        textarea { width: 100%; padding: 15px; background: #16213e; border: 1px solid #667eea; border-radius: 10px; color: #fff; font-size: 1em; resize: none; height: 100px; }
        .btn { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; padding: 12px 30px; border-radius: 25px; cursor: pointer; font-size: 1em; margin-top: 10px; width: 100%; }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .response-section { background: #1a1a2e; border-radius: 15px; padding: 25px; min-height: 150px; }
        .response-section h2 { margin-bottom: 15px; color: #667eea; }
        .ai-response { line-height: 1.8; white-space: pre-wrap; color: #ccc; }
        .loading { color: #667eea; }
        .task-chips { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
        .chip { background: #16213e; border: 1px solid #667eea; border-radius: 20px; padding: 8px 15px; cursor: pointer; font-size: 0.85em; }
        .chip:hover { background: #667eea; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚀 TaskMaster AI</h1>
        <p>Your Smart AI Productivity Companion — Never Miss a Deadline!</p>
    </div>
    <div class="container">
        <div class="input-section">
            <h2>📝 Tell me your tasks</h2>
            <div class="task-chips">
                <div class="chip" onclick="setPrompt('I have 3 assignments due tomorrow and an exam next week')">📚 Assignments & Exam</div>
                <div class="chip" onclick="setPrompt('I have a job interview tomorrow and I have not prepared')">💼 Job Interview</div>
                <div class="chip" onclick="setPrompt('I have multiple project deadlines this week')">⚡ Multiple Deadlines</div>
                <div class="chip" onclick="setPrompt('Help me plan my day productively')">📅 Plan My Day</div>
            </div>
            <textarea id="userInput" placeholder="Example: I have 3 assignments due tomorrow, an interview on Friday..."></textarea>
            <button class="btn" onclick="getAIHelp()" id="submitBtn">🤖 Get AI Help Now</button>
        </div>
        <div class="response-section">
            <h2>🎯 AI Productivity Plan</h2>
            <div class="ai-response" id="aiResponse">Your personalized plan will appear here...</div>
        </div>
    </div>

    <script>
        const API_KEY = "Your_API_KEY_HERE";

        function setPrompt(text) {
            document.getElementById('userInput').value = text;
        }

        async function getAIHelp() {
            const input = document.getElementById('userInput').value.trim();
            if (!input) { alert('Please enter your tasks!'); return; }

            const btn = document.getElementById('submitBtn');
            const responseDiv = document.getElementById('aiResponse');

            btn.disabled = true;
            btn.textContent = 'AI is thinking...';
            responseDiv.innerHTML = '<span class="loading">Creating your personalized productivity plan...</span>';

            try {
                const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'x-goog-api-key': API_KEY
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: `You are TaskMaster AI, an expert productivity coach. The user has: "${input}". Provide: 1. Priority List 2. Hour-by-hour schedule 3. Smart Tips 4. Deadline Alerts 5. Success Plan. Use emojis, be specific and motivating.`
                            }]
                        }]
                    })
                });

                const data = await response.json();
                if(data.candidates) {
                    responseDiv.textContent = data.candidates[0].content.parts[0].text;
                } else {
                    responseDiv.textContent = 'Error: ' + JSON.stringify(data);
                }
            } catch (error) {
                responseDiv.textContent = 'Error: ' + error.message;
            }

            btn.disabled = false;
            btn.textContent = '🤖 Get AI Help Now';
        }
    </script>
</body>
</html>
